# trellis configuration — edit and re-run; CLI flags override these.

# Path to the Obsidian vault to index.
vault = "/Users/mark/Library/Mobile Documents/iCloud~md~obsidian/Documents/Mark's vault"

# Ollama embedding model. Swap to run the bake-off:
#   qwen3-embedding:0.6b   (default — 32K context, top MTEB for its size)
#   qwen3-embedding:4b     (more recall, still trivial on 48 GB)
#   embeddinggemma         (smallest footprint; 2K context)
embed_model = "qwen3-embedding:0.6b"

ollama_url = "http://localhost:11434"

# Directories never indexed (matched by name at any depth).
exclude_dirs = [
    ".obsidian", ".trash", ".git", "node_modules",
    "_claude-output", "templates", "Templates", ".smart-env", "_Admin", "Tonal", "Daily Notes", "Randonneurs Ontario", "PBP Digests"
]

batch_size = 16    # notes per embedding request
max_chars  = 6000  # per-note text cap (qwen3-embedding runner crashes above ~7k)

# --- gardener (phase 2) ---
gen_model   = "qwen3.6:35b-a3b"  # judgment model for link/tag suggestions
gen_timeout     = 120            # seconds per generation before skipping a note
gen_num_predict = 1024           # output token cap (prevents greedy runaway)
garden_scope = ["z/", "MOCs", "Areas"]            # path prefixes the gardener processes as sources
garden_limit = 60                # max notes per run (review burden, not speed; 0 = no cap)
link_candidates      = 8         # semantic neighbors considered per note
max_link_suggestions = 5         # cap accepted links per note
tag_thin_threshold   = 2         # suggest tags only when a note has <= this many
tag_candidate_neighbors = 15     # neighbors whose tags form the candidate vocabulary

# --- auto-MOC clustering (phase 3) ---
cluster_scope            = ["z/"]
umap_components          = 5
umap_neighbors           = 15
umap_min_dist            = 0.0
hdbscan_min_cluster_size = 8
cover_sim_threshold      = 0.60   # provisional; tune after first run
cluster_repr_notes       = 8
random_state             = 42
